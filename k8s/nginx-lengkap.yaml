# 1. Bagian Manajer (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-utama
  namespace: belajar
spec:
  replicas: 2               # Kita buat 2 supaya kalau 1 mati, web tetap nyala
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      containers:
      - name: nginx
        image: nginx:stable-alpine
        ports:
        - containerPort: 80
---
# 2. Bagian Resepsionis (Service)
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: belajar
spec:
  type: NodePort            # Agar bisa dibuka lewat browser Codespaces
  selector:
    app: web-server         # Service ini akan mencari Pod dengan label 'web-server'
  ports:
    - protocol: TCP
      port: 80              # Port di dalam service
      targetPort: 80        # Port di dalam kontainer